<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utwórz konto XimiMail</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-small {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            text-decoration: none;
        }

        .ximi { color: #007bff; }
        .mail { color: #8a2be2; }

        .form-container {
            width: 380px;
            padding: 30px;
            border: 2px solid #f0f0f0;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .input-group input { border: none; margin-bottom: 0; flex: 1; }
        
        .domain-suffix {
            background: #f8f9fa;
            padding: 12px;
            color: #8a2be2;
            font-weight: bold;
            border-left: 1px solid #ddd;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <a href="index.html" class="logo-small"><span class="ximi">Ximi</span><span class="mail">Mail</span></a>

    <div class="form-container">
        <h2>Stwórz swój adres</h2>
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="user" placeholder="użytkownik" required>
                <div class="domain-suffix">@ximi.os</div>
            </div>
            <input type="email" id="gmail" placeholder="Twój obecny Gmail" required>
            <input type="password" id="pass" placeholder="Hasło" required>
            <button type="submit" class="submit-btn">Zarejestruj się</button>
        </form>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const data = {
                gmail: document.getElementById('gmail').value,
                pass: document.getElementById('pass').value,
                ximiAddr: document.getElementById('user').value + "@ximi.os"
            };
            localStorage.setItem('ximiUser', JSON.stringify(data));
            alert('Konto utworzone!');
            window.location.href = 'zaloguj.html';
        };
    </script>
</body>
</html>
