<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utwórz konto XimiMail</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #ffffff;
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-small { font-size: 32px; font-weight: 800; margin-bottom: 20px; text-decoration: none; }
        .ximi { color: #007bff; } .mail { color: #8a2be2; }
        .form-container {
            width: 400px; padding: 30px; border: 2px solid #eee; border-radius: 20px;
            background: white; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .input-group {
            display: flex; align-items: center; margin-bottom: 15px;
            border: 2px solid #ddd; border-radius: 8px; overflow: hidden;
        }
        .input-group input { border: none; margin-bottom: 0; flex: 1; min-width: 0; padding: 12px; outline: none; }
        .domain-suffix {
            background: #f8f9fa; padding: 12px; color: #8a2be2;
            font-weight: bold; border-left: 1px solid #ddd; white-space: nowrap;
        }
        input.full {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd;
            border-radius: 8px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #007bff; }
        .submit-btn {
            width: 100%; padding: 14px; background-color: #007bff; color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .submit-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <a href="index.html" class="logo-small"><span class="ximi">Ximi</span><span class="mail">Mail</span></a>
    <div class="form-container">
        <h2 style="color: #333;">Stwórz swój pierwszy adres</h2>
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="user" placeholder="Wybierz nazwę użytkownika" required>
                <div class="domain-suffix">@ximi.os</div>
            </div>
            <input type="password" id="pass" class="full" placeholder="Utwórz silne hasło" required>
            <input type="password" id="passConfirm" class="full" placeholder="Powtórz hasło" required>
            <button type="submit" class="submit-btn">Zarejestruj i zacznij używać</button>
        </form>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const p1 = document.getElementById('pass').value;
            const p2 = document.getElementById('passConfirm').value;

            if(p1 !== p2) {
                alert('Hasła nie są takie same!');
                return;
            }

            const data = {
                pass: p1,
                ximiAddr: document.getElementById('user').value + "@ximi.os"
            };
            localStorage.setItem('ximiUser', JSON.stringify(data));
            alert('Twoje konto XimiMail zostało utworzone!');
            window.location.href = 'zaloguj.html';
        };
    </script>
</body>
</html>
